id = "urdf"
name = "URDF"
description = "URDF language support for Zed with syntax highlighting and completions."
version = "0.1.0"
schema_version = 1
authors = ["MorningFrog <1098224028@qq.com>"]
repository = "https://github.com/MorningFrog/zed-urdf"

[grammars.xml]
repository = "https://github.com/tree-sitter-grammars/tree-sitter-xml"
